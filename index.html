        .calc-panel-inline { width: 100%; gap: 5px; margin-top: 5px; display: none; align-items: center; }

        .worker-actions-menu { display: none; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; width: 100%; }

    <script>
        const WORKER_URL = 'https://snowy-block-fcdb.cryptokakhnych.workers.dev';
        const SUPABASE_URL = 'https://mnexoturnujxjjicfukc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uZXhvdHVybnVqeGpqaWNmdWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MTY1MzksImV4cCI6MjA4NTA5MjUzOX0.Ye4PJuEpuyLLRACkv72tvf0mh7IBn7JYRA8OJ1kLrc0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const EUR_RATE = 24.22; // Используется для конвертации в рейтинге и балансе

        let firms = JSON.parse(localStorage.getItem('monek_firms')) || ["Monek Group"];
        let dbUsers = [];
        let curF = "", deleteMode = false, currentWorkerId = null, isAdminViewing = false;
        const ADMIN_IDS = ["7384770465", "663587165"];

        async function initApp() {
            renderFirms(); generateDaysTable(); await loadProfileData(); await fetchLeaderboardData();
            document.getElementById('m-profile').onclick = () => showScreen('profile-screen', 'var(--bg-main)');
            document.getElementById('m-clocks').onclick = () => { isAdminViewing = false; renderFirms(); showScreen('clocks-screen', 'var(--bg-main)'); };
            document.getElementById('m-advances').onclick = () => showScreen('advances-screen', 'var(--bg-main)');
            document.getElementById('m-top').onclick = () => { fetchLeaderboardData(); renderLeaderboard(); showScreen('top-screen', 'var(--bg-main)'); };
            document.getElementById('m-account').onclick = () => { fetchLeaderboardData(); showScreen('account-screen', 'var(--bg-main)'); };
            document.getElementById('m-workers').onclick = () => {
                const p = JSON.parse(localStorage.getItem('monek_prof'));
                if(p && ADMIN_IDS.includes(String(p.external_id))) { fetchLeaderboardData(); showScreen('workers-screen', 'var(--bg-main)'); }
                else alert("Доступ запрещен");
            };
            
            let start = Date.now(), dur = 2000;
            const frame = () => {
                let pct = Math.min(((Date.now()-start)/dur)*100, 100);
                document.getElementById('progress-bar').style.width = pct+'%';
                document.getElementById('loading-text').innerText = Math.floor(pct)+'%';
                if(pct < 100) requestAnimationFrame(frame);
                else setTimeout(() => showScreen('menu-screen', 'var(--bg-menu)'), 300);
            };
            requestAnimationFrame(frame);
        }

        function showScreen(id, bgVar) {
            document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
            const target = document.getElementById(id);
            target.style.display = 'block'; setTimeout(() => target.classList.add('active'), 20);
            if(bgVar) document.getElementById('fixed-bg').style.backgroundImage = bgVar;
        }
        function backToMenu() { isAdminViewing = false; showScreen('menu-screen', 'var(--bg-menu)'); }

        async function fetchLeaderboardData() {
            const { data } = await supabaseClient.from('profiles').select('*');
            if(data) { dbUsers = data; updateMyStats(); renderWorkers(); }
        }

        // --- ЛОГИКА БАЛАНСА (К ВЫДАЧЕ) ---
        function updateMyStats() {
            const myId = JSON.parse(localStorage.getItem('monek_prof'))?.external_id;
            const u = dbUsers.find(x => String(x.external_id) === String(myId));
            const box = document.getElementById('acc-stats-box');
            if(u) {
                // Теперь salary - это сумма к выдаче, так как авансы вычитаются при одобрении
                box.innerHTML = `
                    <div class="stat-row-decor"><span>Баланс (К выдаче):</span><span class="stat-value" style="color:#00dd66;">${u.salary || 0} Kč</span></div>
                    <div class="stat-row-decor"><span>Всего авансов (CZK):</span><span class="stat-value">${u.adv_czk || 0} Kč</span></div>
                    <div class="stat-row-decor"><span>Всего авансов (EUR):</span><span class="stat-value">${u.adv_eur || 0} €</span></div>
                    <div class="stat-row-decor"><span>Штрафы:</span><span class="stat-value" style="color:red;">${u.fines || 0} Kč</span></div>`;
            }
        }

        // --- ЛОГИКА АДМИН-ПАНЕЛИ (ИСПРАВЛЕННЫЙ МЕХАНИЗМ) ---
        async function updateWorkerFinance(type, inputId, multiplier) {
            const amount = parseFloat(document.getElementById('inp-' + inputId).value);
            if(!amount || isNaN(amount)) return;
            const u = dbUsers.find(x => x.external_id == currentWorkerId);
            if(!u) return;

            let newSalary = parseFloat(u.salary) || 0;
            let newAdvCzk = parseFloat(u.adv_czk) || 0;
            let newAdvEur = parseFloat(u.adv_eur) || 0;
            let newFines = parseFloat(u.fines) || 0;

            const val = amount * multiplier;

            if (type === 'salary') {
                newSalary += val;
            } else if (type === 'adv_czk') {
                // Вычитаем из зарплаты и ПРИБАВЛЯЕМ в историю авансов
                newSalary -= val; 
                newAdvCzk += val;
            } else if (type === 'adv_eur') {
                newSalary -= (val * EUR_RATE);
                newAdvEur += val;
            } else if (type === 'fines') {
                newSalary -= val;
                newFines += val;
            }

            // Ограничение: баланс не может быть меньше 0 (опционально)
            newSalary = Math.max(-999999, newSalary); 

            const { error } = await supabaseClient.from('profiles').update({
                salary: newSalary,
                adv_czk: Math.max(0, newAdvCzk),
                adv_eur: Math.max(0, newAdvEur),
                fines: Math.max(0, newFines)
            }).eq('external_id', currentWorkerId);

            if(error) alert("Ошибка БД: " + error.message);
            else {
                u.salary = newSalary; u.adv_czk = newAdvCzk; u.adv_eur = newAdvEur; u.fines = newFines;
                openWorkerAccount(currentWorkerId); // Перерисовать окно
            }
        }

        function openWorkerAccount(id) {
            currentWorkerId = id;
            const u = dbUsers.find(x => x.external_id == id);
            document.getElementById('we-title').innerText = u.login;
            let h = `
                <div class="stat-row-decor" style="border:2px solid #00dd66;"><span style="color:white;">К ВЫДАЧЕ:</span><span class="stat-value" style="color:#00dd66;">${u.salary} Kč</span></div>
                <div class="worker-cat-row"><span>Зарплата (Изменить баланс)</span><button class="btn-panel-gold btn-small" onclick="toggleCalc('sal')">±</button></div>
                <div id="calc-sal" class="calc-panel-inline"><input type="number" id="inp-sal" class="calc-input"><button class="btn-icon-action btn-green" onclick="updateWorkerFinance('salary','sal', 1)">+</button><button class="btn-icon-action btn-red" onclick="updateWorkerFinance('salary','sal', -1)">-</button></div>
                
                <div class="worker-cat-row"><span>Аванс CZK (Минусует зарплату)</span><button class="btn-panel-gold btn-small" onclick="toggleCalc('ac')">±</button></div>
                <div id="calc-ac" class="calc-panel-inline"><input type="number" id="inp-ac" class="calc-input"><button class="btn-icon-action btn-green" onclick="updateWorkerFinance('adv_czk','ac', 1)">Одобрить</button><button class="btn-icon-action btn-red" onclick="updateWorkerFinance('adv_czk','ac', -1)">Отмена</button></div>

                <div class="worker-cat-row"><span>Аванс EUR (Курс ${EUR_RATE})</span><button class="btn-panel-gold btn-small" onclick="toggleCalc('ae')">±</button></div>
                <div id="calc-ae" class="calc-panel-inline"><input type="number" id="inp-ae" class="calc-input"><button class="btn-icon-action btn-green" onclick="updateWorkerFinance('adv_eur','ae', 1)">Одобрить</button><button class="btn-icon-action btn-red" onclick="updateWorkerFinance('adv_eur','ae', -1)">Отмена</button></div>

                <div class="worker-cat-row"><span>Штрафы</span><button class="btn-panel-gold btn-small" onclick="toggleCalc('fin')">±</button></div>
                <div id="calc-fin" class="calc-panel-inline"><input type="number" id="inp-fin" class="calc-input"><button class="btn-icon-action btn-green" onclick="updateWorkerFinance('fines','fin', 1)">Выписать</button><button class="btn-icon-action btn-red" onclick="updateWorkerFinance('fines','fin', -1)">Удалить</button></div>
            `;
            document.getElementById('we-content').innerHTML = h;
            showScreen('worker-edit-screen', 'var(--bg-main)');
        }

        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        function renderWorkers() {
            const c = document.getElementById('workers-list'); c.innerHTML = "";
            dbUsers.forEach(u => {
                c.innerHTML += `<div class="worker-item-card">
                    <div class="worker-card-header"><div><b>${u.login}</b><div style="font-size:10px;">Баланс: ${u.salary} Kč</div></div>
                    <button class="btn-panel-gold btn-small" style="padding:5px 10px;" onclick="openWorkerAccount('${u.external_id}')">СЧЕТ</button></div>
                </div>`;
            });
        }

        function renderLeaderboard() {
            let html = `<table class="leaderboard-table">`;
            [...dbUsers].sort((a,b) => ((b.adv_czk||0)+(b.adv_eur||0)*EUR_RATE) - ((a.adv_czk||0)+(a.adv_eur||0)*EUR_RATE)).forEach((u, i) => {
                html += `<tr><td>${i+1}</td><td>${u.login}</td><td>${u.adv_eur||0} € / ${u.adv_czk||0} Kč</td></tr>`;
            });
            document.getElementById('leaderboard-content').innerHTML = html + `</table>`;
        }

        async function submitAdvance() {
            const amt = document.getElementById('adv-amount').value;
            const cur = document.getElementById('adv-currency').value;
            if(!amt) return alert("Введите сумму");
            const ok = await sendRequestToWorker({ type: 'advance', id: 2, amount: amt, reason: `Аванс ${cur.toUpperCase()}: ${document.getElementById('adv-reason').value}` });
            if(ok) backToMenu();
        }

        async function sendRequestToWorker(data) {
            const p = JSON.parse(localStorage.getItem('monek_prof'));
            if (!p?.external_id) return alert("Заполни ID в профиле!");
            data.user_id = p.external_id; data.user_name = p.login || "Unknown";
            try {
                const res = await fetch(`${WORKER_URL}/submit`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
                if(res.ok) { alert("Отправлено!"); return true; }
            } catch (e) { alert("Ошибка!"); }
            return false;
        }

        function toggleCalc(id) { document.querySelectorAll('.calc-panel-inline').forEach(el => el.classList.remove('active')); document.getElementById('calc-'+id).classList.add('active'); }
        function hideKeyboard(e) { if(!['INPUT','BUTTON','SELECT'].includes(e.target.tagName)) document.activeElement.blur(); }
        
        // Стандартные функции для корректной работы интерфейса
        function renderFirms() {
            const c = document.getElementById('firm-list-container'); c.innerHTML = '';
            firms.forEach(f => {
                c.innerHTML += `<div style="display:flex;justify-content:space-between;padding:10px;border:1px solid gold;margin-bottom:5px;border-radius:8px;">
                    <span style="color:white;">${f}</span>
                    <button class="btn-panel-gold btn-small" onclick="openHours('${f}')">ВЫБРАТЬ</button>
                </div>`;
            });
        }
        function generateDaysTable() {
            const b = document.getElementById('hours-tbody'); b.innerHTML = '';
            for(let i=1; i<=31; i++) b.innerHTML += `<tr><td>${i}</td><td><input type="text" class="hour-input-cell inp-f"></td><td><input type="text" class="hour-input-cell inp-t"></td><td class="res-h">0</td><td><input type="text" class="hour-input-cell inp-s"></td></tr>`;
        }
        async function loadProfileData() {
            const p = JSON.parse(localStorage.getItem('monek_prof'));
            if(p) { document.getElementById('prof-login').value = p.login; document.getElementById('prof-id').value = p.external_id; document.getElementById('prof-workdate').value = p.work; }
        }
        async function submitProfile() {
            const p = { login: document.getElementById('prof-login').value, work: document.getElementById('prof-workdate').value, external_id: document.getElementById('prof-id').value };
            localStorage.setItem('monek_prof', JSON.stringify(p));
            await supabaseClient.from('profiles').upsert([{ external_id: p.external_id, login: p.login, work_date: p.work }], { onConflict: 'external_id' });
            alert("Сохранено!"); backToMenu();
        }

        window.onload = initApp;
    </script>
</body>
</html>
